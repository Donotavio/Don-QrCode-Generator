name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para o deploy no GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (tentativa 1)
        id: d1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Esperar
        if: steps.d1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (tentativa 2)
        id: d2
        uses: actions/deploy-pages@v4
        if: steps.d1.outcome == 'failure'
        continue-on-error: true

      - name: Esperar
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (tentativa 3 — final)
        id: deployment
        uses: actions/deploy-pages@v4
        if: steps.d2.outcome != 'success'
