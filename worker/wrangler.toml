name = "don-qr"
main = "src/index.ts"
compatibility_date = "2025-01-01"
account_id = "2d93944671f7b906cdca409ca4abb6c0"

# Secrets (NÃO commitar os valores — definir via `wrangler secret put`):
#   GITHUB_CLIENT_SECRET  -> secret da OAuth App
#   ALLOWED_USERNAME      -> "Donotavio"  (re-validado no cliente também)
#   KV namespace id é injetado abaixo.

# Obs.: o id do KV será preenchido após `wrangler kv:namespace create QR_ANALYTICS`.
[[kv_namespaces]]
binding = "QR_ANALYTICS"
id = "COLOQUE_O_KV_ID_AQUI"

# CORS: origins permitidos (produção + dev local).
[vars]
ALLOWED_ORIGINS = "https://donotavio.github.io,http://localhost:5173"
